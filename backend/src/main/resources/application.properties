spring.application.name=myspringbootapp

server.port=8080

# MySQL — 通过环境变量覆盖，或在 application-local.properties 中配置
spring.datasource.url=jdbc:mysql://localhost:3306/my_project_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.defer-datasource-initialization=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT — 生产环境必须通过环境变量 JWT_SECRET 覆盖
app.jwt.secret=${JWT_SECRET:bv1epz19574qdiq7cy0i7hd7a94ghc40812boxqfyput5nvyd0k06vhddjls4j5r}
app.jwt.expirationMs=86400000

logging.level.org.springframework.security=WARN

# Python 分配脚本 — 本地开发在 application-local.properties 中覆盖
app.python.interpreter.path=${PYTHON_PATH:python}
app.python.script.path=${PYTHON_SCRIPT_PATH:scripts/dorm_assignment.py}
app.data.temp.dir=${TEMP_DATA_DIR:temp_data}
